training:
  batch_size: 32
  epochs: 1000
  learning_rate: 0.00003
  weight_decay: 0.01
  seed: 42
  val_split: 0.2
  num_workers: 2
  early_stopping_patience: 15
  resume_checkpoint: ""

data:
  parquet_path: "data/processed/utterances.parquet"
  audio_base_path: "data"
  checkpoint_dir: "checkpoints"
  sample_rate: 16000

wandb:
  project: "speech-model"
  entity: siyer22
  enabled: true
