model:
  d_model: 256
  num_heads: 4
  ff_dim: 1024
  num_layers: 4
  conv_kernel_size: 31
  dropout: 0.1
  backbone: hubert_base
  freeze_backbone: true

training:
  batch_size: 16
  epochs: 1000
  learning_rate: 0.001
  weight_decay: 0.01
  seed: 42
  val_split: 0.2
  num_workers: 2
  early_stopping_patience: 50

data:
  parquet_path: "data/processed/utterances.parquet"
  audio_base_path: "data"
  checkpoint_dir: "checkpoints"
  sample_rate: 16000

wandb:
  project: "speech-model"
  entity: siyer22
  enabled: true

decoding:
  method: greedy
  beam_width: 2
