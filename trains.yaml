model:
  encoder_name: "microsoft/wavlm-large"
  encoder_dim: 1024
  hidden_dim: 256
  num_layers: 2
  dropout: 0.4
  phonetic_mode: "target_only"  # "none", "target_only"
  phonetic_dim: 128
  architecture: "cross_attention"  # "mlp", "cross_attention", "bidirectional_attention", "label_attention"

training:
  batch_size: 256
  epochs: 1000
  learning_rate: 0.001
  weight_decay: 0.01
  seed: 42
  k_folds: 5
  threshold: 0.3
  num_workers: 8
  early_stopping_patience: 40
  save_best_only: true
  loss_type: "bce"
  focal_alpha: 0.5   # Higher alpha = more weight on positives (rare classes)
  focal_gamma: 2.0   # Focus on hard examples
  adversarial_training: true  # Enable participant-invariant features
  adversarial_lambda: 0.1      # Weight for adversarial loss
  adversarial_warmup_epochs: 10  # Epochs before full adversarial strength
  mixup_alpha: 0.0  # Mixup augmentation (0 = disabled, 0.2-0.4 typical)

data:
  parquet_path: "data/processed/utterances.parquet"
  ontology_path: "ontology.yaml"
  embeddings_dir: "data/embeddings"
  sample_rate: 16000
  checkpoint_dir: "checkpoints"
  clean_labels: true

wandb:
  project: "speech-model"
  entity: siyer22
  enabled: true
