model:
  encoder_name: "microsoft/wavlm-large"
  encoder_dim: 1024  # Determined by wavlm-large
  hidden_dim: 1024
  num_layers: 3
  dropout: 0.1

training:
  batch_size: 1024
  epochs: 1000
  learning_rate: 0.001
  seed: 42
  k_folds: 5
  threshold: 0.3
  num_workers: 8
  early_stopping_patience: 50
  save_best_only: true

data:
  parquet_path: "data/processed/utterances.parquet"
  ontology_path: "ontology.yaml"
  embeddings_dir: "data/embeddings"
  sample_rate: 16000
  checkpoint_dir: "checkpoints"
  clean_labels: true  # Remove substitution_error when other patterns exist

wandb:
  project: "speech-model"
  entity: siyer22
  enabled: true

