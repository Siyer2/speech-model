model:
  encoder_name: "facebook/wav2vec2-base"

training:
  batch_size: 8
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.01
  seed: 42
  val_split: 0.2
  num_workers: 4
  early_stopping_patience: 10

data:
  parquet_path: "data/processed/utterances.parquet"
  audio_base_path: "data"
  checkpoint_dir: "checkpoints"
  sample_rate: 16000

wandb:
  project: "speech-model"
  entity: siyer22
  enabled: true
