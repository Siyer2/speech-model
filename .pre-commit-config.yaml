repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff lint
        entry: ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]

  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: uvx ty check --project model
        language: system
        types: [python]
        exclude: ^model/scripts/

