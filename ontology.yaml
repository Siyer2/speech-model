error_patterns:
  voicing:
    id: "voicing"
    description: "Changes a voiceless sound to a voiced sound"
    sounds_affected:
      - "t → d"
      - "p → b"
      - "k → g"
    examples:
      - input: "toe"
        output: "doe"
      - input: "path"
        output: "baf"
      - input: "kiss"
        output: "giss"
    age_appropriate: true
    resolution_age: "3 years"
    resolution_age_months: 36

  final_consonant_deletion:
    id: "final_consonant_deletion"
    description: "Deletes the last sound in a word"
    sounds_affected: []
    examples:
      - input: "cup"
        output: "cu"
    age_appropriate: true
    resolution_age: "3 years 3 months"
    resolution_age_months: 39

  fronting:
    id: "fronting"
    description: "Changes a 'back' sound to a 'front' sound"
    sounds_affected:
      - "k → t"
      - "g → d"
      - "sh → s"
      - "ng → n"
    examples:
      - input: "cup"
        output: "tup"
      - input: "girl"
        output: "durl"
      - input: "ship"
        output: "sip"
      - input: "wing"
        output: "win"
    age_appropriate: true
    resolution_age: "3 years 6 months"
    resolution_age_months: 42

  weak_syllable_deletion:
    id: "weak_syllable_deletion"
    description: "Deletes the 'unstressed' parts of a word"
    sounds_affected: []
    examples:
      - input: "banana"
        output: "nana"
      - input: "elephant"
        output: "efant"
    age_appropriate: true
    resolution_age: "4 years"
    resolution_age_months: 48

  cluster_reduction:
    id: "cluster_reduction"
    description: "Deletes one sound from a consonant cluster"
    sounds_affected:
      - "sp → p"
      - "sm → m"
      - "pl → l"
    examples:
      - input: "spoon"
        output: "poon"
      - input: "smoke"
        output: "moke"
      - input: "plane"
        output: "pane"
    age_appropriate: true
    resolution_age: "4 years"
    resolution_age_months: 48

  gliding_l:
    id: "gliding_l"
    description: "Changes a 'l' sound to a 'w' or 'y' sound"
    sounds_affected:
      - "l → w"
      - "l → y"
    examples:
      - input: "leaf"
        output: "yweaf"
    age_appropriate: true
    resolution_age: "5 years"
    resolution_age_months: 60

  gliding_r:
    id: "gliding_r"
    description: "Changes a 'r' sound to a 'w' or 'y' sound"
    sounds_affected:
      - "r → w"
      - "r → y"
    examples:
      - input: "red"
        output: "ywed"
    age_appropriate: true
    resolution_age: "5 years"
    resolution_age_months: 60

  stopping_f_s:
    id: "stopping_f_s"
    description: "Changes a fricative sound to a 'short' stop sound"
    sounds_affected:
      - "f → p"
      - "s → t"
    examples: []
    age_appropriate: true
    resolution_age: "3 years"
    resolution_age_months: 36

  stopping_v_z:
    id: "stopping_v_z"
    description: "Changes a fricative sound to a 'short' stop sound"
    sounds_affected:
      - "v → b"
      - "z → d"
    examples: []
    age_appropriate: true
    resolution_age: "3 years 6 months"
    resolution_age_months: 42

  stopping_sh_ch_j:
    id: "stopping_sh_ch_j"
    description: "Changes a fricative/affricate sound to a 'short' stop sound"
    sounds_affected:
      - "sh → t"
      - "ch → t"
      - "j → d"
    examples: []
    age_appropriate: true
    resolution_age: "4 years 6 months"
    resolution_age_months: 54

  deaffrication:
    id: "deaffrication"
    description: "Changes a 'j' or 'ch' sound to a fricative or stop"
    sounds_affected:
      - "ch → sh"
      - "j → zh"
    examples:
      - input: "chair"
        output: "share"
      - input: "jam"
        output: "zham"
    age_appropriate: true
    resolution_age: "4 years"
    resolution_age_months: 48

  fricative_simplification:
    id: "fricative_simplification"
    description: "Changes a 'th' sound to a 'f' sound"
    sounds_affected:
      - "th → f"
    examples:
      - input: "thumb"
        output: "fum"
    age_appropriate: true
    resolution_age: "7 years"
    resolution_age_months: 84

  diminutisation:
    id: "diminutisation"
    description: "Addition of the long 'ee' sound to the end of a word"
    sounds_affected: []
    examples:
      - input: "bird"
        output: "birdy"
    age_appropriate: true
    resolution_age: "3 years"
    resolution_age_months: 36

  epenthesis:
    id: "epenthesis"
    description: "Addition of an unstressed 'e' (schwa)"
    sounds_affected: []
    examples:
      - input: "blue"
        output: "belue"
    age_appropriate: true
    resolution_age: "8 years"
    resolution_age_months: 96

  assimilation:
    id: "assimilation"
    description: "Changes a sound so it takes on a characteristic of another sound in the word"
    sounds_affected: []
    examples:
      - input: "yellow"
        output: "lello"
    age_appropriate: true
    resolution_age: "3 years 9 months"
    resolution_age_months: 45

  metathesis:
    id: "metathesis"
    description: "Changes the order of sounds within a word"
    sounds_affected: []
    examples:
      - input: "spaghetti"
        output: "pasgetti"
    age_appropriate: true
    resolution_age: "8 years"
    resolution_age_months: 96

  reduplication:
    id: "reduplication"
    description: "Repeats the first syllable as the second syllable"
    sounds_affected: []
    examples:
      - input: "water"
        output: "wawa"
    age_appropriate: true
    resolution_age: "3 years"
    resolution_age_months: 36

  coalescence:
    id: "coalescence"
    description: "Substitutes two sounds with a different sound that still has similar features"
    sounds_affected: []
    examples:
      - input: "spoon"
        output: "foon"
    age_appropriate: true
    resolution_age: "6 years"
    resolution_age_months: 72

  # Atypical patterns (not part of typical development)
  sound_preference:
    id: "sound_preference"
    description: "Changes a range of sounds to a 'favourite' sound"
    sounds_affected: []
    examples: []
    age_appropriate: false
    resolution_age: null
    resolution_age_months: null
    notes: "Not part of typical speech development"

  backing:
    id: "backing"
    description: "Changes a 'front' sound to a 'back' sound"
    sounds_affected:
      - "t → k"
      - "d → g"
    examples:
      - input: "toe"
        output: "koe"
      - input: "door"
        output: "gore"
    age_appropriate: false
    resolution_age: null
    resolution_age_months: null
    notes: "Not part of typical speech development"

  vowel_distortions:
    id: "vowel_distortions"
    description: "Inaccurate production of vowel sounds"
    sounds_affected: []
    examples: []
    age_appropriate: false
    resolution_age: null
    resolution_age_months: null
    notes: "Not part of typical speech development"

  initial_consonant_deletion:
    id: "initial_consonant_deletion"
    description: "Deletes the first sound in a word"
    sounds_affected: []
    examples: []
    age_appropriate: false
    resolution_age: null
    resolution_age_months: null
    notes: "Not part of typical speech development"

  # Articulation errors
  lateral_lisp:
    id: "lateral_lisp"
    description: "Produces the 's' and 'z' sounds with the air escaping over the sides of the tongue"
    sounds_affected:
      - "s*"
      - "z*"
    examples: []
    error_type: "articulation"
    age_appropriate: false
    resolution_age: null
    resolution_age_months: null
    acquisition_age: "4 years"
    notes: "Not part of typical speech development. Should acquire sound by 4 years"

  interdental_lisp:
    id: "interdental_lisp"
    description: "Produces the 's' and 'z' sounds with the tongue protruding between the teeth"
    sounds_affected:
      - "s*"
      - "z*"
    examples: []
    error_type: "articulation"
    age_appropriate: false
    resolution_age: "4.5 years"
    resolution_age_months: 54
    notes: "Can be a normal developmental phase for some children but is expected to resolve by 4½ years of age"

  interdental_lisp_extended:
    id: "interdental_lisp_extended"
    description: "Produces the 's', 't', 'd', 'l' and 'z' sounds with the tongue protruding between the teeth"
    sounds_affected:
      - "s*"
      - "z*"
      - "t*"
      - "d*"
      - "l*"
    examples: []
    error_type: "articulation"
    age_appropriate: false
    resolution_age: "4.5 years"
    resolution_age_months: 54
    notes: "Articulation error likely due to tongue thrust. Can be a normal developmental phase for some children but is expected to resolve by 4½ years of age"

  substitution_error:
    id: "substitution_error"
    description: "Changes one sound to another sound"
    sounds_affected: []
    examples: []
    age_appropriate: null
    resolution_age: "variable"
    resolution_age_months: null
    notes: "Template for specific substitution patterns. Age depends on specific sounds involved"
